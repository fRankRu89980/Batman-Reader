<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Batman Comic Reader 2.1</title>

<style>
:root{
  --bg:#121212;
  --panel:rgba(255,255,255,0.08);
  --panel-strong:rgba(15,23,42,0.9);
  --stroke:rgba(255,255,255,0.14);
  --gold:#f1c40f;
  --gold-soft:#ffdb4d;
  --text:#ffffff;
  --muted:rgba(255,255,255,0.72);
  --shadow:0 24px 60px rgba(0,0,0,0.55);
}

html{
  height:100%;
  overscroll-behavior:none;
}

*{box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:"Segoe UI",Tahoma,Verdana,sans-serif;
  margin:0;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:28px 20px 40px;
  overflow-x:hidden;
  overscroll-behavior:none;
}

#bg-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-3;
  filter:brightness(0.22) blur(4px) contrast(1.12);
  transform:scale(1.05);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 50% 22%, rgba(241,196,15,0.14), transparent 28%),
    radial-gradient(circle at center, transparent 36%, rgba(0,0,0,0.7) 100%);
  pointer-events:none;
}

.menu{
  position:fixed;
  top:20px;
  left:24px;
  display:flex;
  gap:10px;
  padding:8px 12px;
  background:rgba(15,23,42,0.84);
  backdrop-filter:blur(20px);
  border:1px solid var(--stroke);
  border-radius:30px;
  box-shadow:var(--shadow);
  z-index:2000;
  transition:transform .35s ease, opacity .35s ease, visibility .35s ease;
}

.menu.hidden{
  opacity:0;
  visibility:hidden;
  transform:translateY(-16px);
  pointer-events:none;
}

.link{
  display:inline-flex;
  align-items:center;
  gap:10px;
  width:52px;
  height:52px;
  padding:0 8px;
  overflow:hidden;
  white-space:nowrap;
  border-radius:18px;
  text-decoration:none;
  font-weight:700;
  font-size:14px;
  color:var(--gold);
  background:rgba(255,255,255,0.08);
  transition:width .45s cubic-bezier(.175,.885,.32,1.275), background .25s ease, transform .18s ease, color .25s ease;
}

.link:hover,
.link:focus-visible,
.link.expanded{
  width:220px;
  background:rgba(241,196,15,0.96);
  color:#0f172a;
  transform:translateY(-2px);
}

.link.active{
  background:var(--gold);
  color:#0f172a;
  box-shadow:0 6px 18px rgba(241,196,15,0.45);
}

.link-icon{
  min-width:28px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}

.link-text{
  max-width:0;
  opacity:0;
  transform:translateX(-6px);
  transition:max-width .45s ease, opacity .25s ease, transform .25s ease;
  color:inherit;
}

.link:hover .link-text,
.link:focus-visible .link-text,
.link.expanded .link-text{
  max-width:480px;
  opacity:1;
  transform:translateX(0);
}

.title-container{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  width:100%;
  max-width:980px;
  margin:20px 0 14px;
  text-align:center;
}

.logo-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.6));
}

.title-text{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  line-height:1;
}

.title-main{
  margin:0;
  position:relative;
  z-index:2;
  font-weight:900;
  font-size:clamp(36px, 6.5vw, 92px);
  letter-spacing:6px;
  text-transform:uppercase;
  background:linear-gradient(180deg, #fff0b8 0%, var(--gold) 30%, #c28f06 60%, #0b0b0b 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  text-shadow:0 1px 0 rgba(0,0,0,0.55), 0 10px 30px rgba(0,0,0,0.45);
  transition:transform .35s cubic-bezier(.2,.9,.2,1), filter .35s ease;
}

.title-main::after{
  content:"";
  position:absolute;
  left:-10%;
  top:0;
  width:120%;
  height:40%;
  transform:skewX(-12deg);
  background:linear-gradient(90deg, rgba(255,255,255,0.08), rgba(255,255,255,0.35), rgba(255,255,255,0.08));
  pointer-events:none;
  mix-blend-mode:screen;
  filter:blur(6px);
  opacity:0.9;
}

.title-main.glitch{
  transform:translateX(-2px) skewX(-1deg) scale(1.01);
  filter:drop-shadow(0 6px 18px rgba(0,0,0,0.55));
}

.title-main.glitch::before,
.title-main.glitch::after{
  content:attr(data-text);
  position:absolute;
  inset:0;
  pointer-events:none;
  mix-blend-mode:screen;
  opacity:0.85;
}

.title-main.glitch::before{
  color:rgba(255,96,96,0.9);
  transform:translateX(-3px) translateY(1px);
  clip-path:polygon(0 0,100% 0,100% 30%,0 30%);
}

.title-main.glitch::after{
  color:rgba(96,168,255,0.9);
  transform:translateX(3px) translateY(-1px);
  clip-path:polygon(0 70%,100% 70%,100% 100%,0 100%);
}

.title-sub{
  color:rgba(241,196,15,0.96);
  font-weight:600;
  font-size:clamp(12px, 1.4vw, 16px);
  letter-spacing:1px;
}

.title-reflection{
  position:absolute;
  left:50%;
  top:calc(100% + 6px);
  width:92%;
  height:26px;
  transform:translateX(-50%) scaleY(-1);
  border-radius:8px;
  opacity:0.28;
  filter:blur(6px);
  background:linear-gradient(180deg, rgba(241,196,15,0.08), rgba(0,0,0,0));
  mask-image:linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0));
}

.title-scanline{
  position:absolute;
  inset:0;
  border-radius:8px;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px, rgba(0,0,0,0) 1px);
  background-size:100% 3px;
  mix-blend-mode:overlay;
  opacity:0.18;
}

.reader-meta{
  width:min(100%, 980px);
  display:flex;
  justify-content:center;
  margin:0 0 18px;
}

.status-chip{
  padding:10px 16px;
  border-radius:999px;
  background:rgba(0,0,0,0.34);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--muted);
  font-size:14px;
  text-align:center;
  backdrop-filter:blur(12px);
}

.comic-wrapper{
  position:relative;
  width:min(90vw, 760px);
  padding:22px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:28px;
  box-shadow:0 40px 90px rgba(0,0,0,0.65), inset 0 0 0 1px rgba(255,255,255,0.04);
  perspective:1200px;
  transform-style:preserve-3d;
  transition:transform .4s ease, box-shadow .4s ease;
  touch-action:pan-y pinch-zoom;
  will-change:transform;
}

.comic-wrapper:hover{
  transform:translateY(-6px);
  box-shadow:0 55px 120px rgba(0,0,0,0.75), inset 0 0 0 1px rgba(255,255,255,0.06);
}

.page-stage{
  position:relative;
  overflow:visible;
  transform-style:preserve-3d;
  contain:paint;
}

#main-comic{
  width:100%;
  display:block;
  border-radius:16px;
  background:rgba(0,0,0,0.3);
  transform-origin:center center;
  backface-visibility:hidden;
  transform-style:preserve-3d;
  transition:transform .25s ease-out, opacity .3s ease;
  opacity:1;
  will-change:transform, opacity;
  transform:translate3d(0,0,0);
}

#page-shadow{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:0;
  transition:opacity .25s ease;
}

#page-counter{
  position:absolute;
  right:24px;
  bottom:24px;
  padding:10px 18px;
  border-radius:18px;
  background:var(--panel-strong);
  backdrop-filter:blur(12px);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  font-size:14px;
  font-weight:600;
}

#vignette-container{
  position:absolute;
  inset:0;
}

.vignetta-area{
  position:absolute;
  cursor:pointer;
  background:rgba(255,255,255,0);
  transition:background .18s ease;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  user-select:none;
}

@media (hover:hover){
  .vignetta-area:hover{
    background:rgba(255,255,255,0.12);
    outline:2px solid var(--gold);
  }
}

.vignetta-area.active-touch{
  background:rgba(255,255,255,0.18);
  outline:2px solid var(--gold);
}

.toolbar{
  width:min(90vw, 760px);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin-top:22px;
}

.nav-btn,
.page-jump button{
  padding:10px 22px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg, var(--gold), var(--gold-soft));
  color:#111827;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 12px 28px rgba(241,196,15,0.42);
  transition:transform .22s ease, box-shadow .22s ease, opacity .22s ease;
}

.nav-btn:hover,
.page-jump button:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 40px rgba(241,196,15,0.55);
}

.nav-btn:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}

.page-jump{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:center;
}

.page-jump input{
  width:110px;
  padding:10px 14px;
  border:2px solid #333;
  border-radius:12px;
  background:#1e1e1e;
  color:var(--gold);
  text-align:center;
  font-size:15px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  z-index:3000;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.95);
  cursor:zoom-out;
}

.modal-content{
  max-width:95%;
  max-height:95%;
  border-radius:14px;
  box-shadow:0 30px 80px rgba(0,0,0,0.8);
}

@media (max-width: 600px){
  body{
    padding-top:84px;
    padding-bottom:140px;
    min-height:calc(100dvh + 140px);
    overflow-x:hidden;
    overflow-y:auto;
    overscroll-behavior-y:contain;
    touch-action:manipulation;
  }
  .menu{
    top:8px;
    left:50%;
    transform:translateX(-50%);
    padding:6px 8px;
    box-shadow:0 12px 30px rgba(0,0,0,0.55);
  }
  .menu.hidden{
    transform:translateX(-50%) translateY(-14px);
  }
  .link{
    min-width:44px;
    height:44px;
    font-size:13px;
  }
  .title-container{
    gap:12px;
    margin-top:0;
  }
  .title-main{letter-spacing:2px}
  .comic-wrapper{
    width:min(94vw, 760px);
    padding:14px;
    touch-action:none;
  }
  .nav-btn{
    display:none;
  }
  #page-counter{
    right:14px;
    bottom:14px;
    padding:8px 12px;
    font-size:13px;
  }
}

@supports not (background-clip:text){
  .title-main{
    color:var(--gold);
    background:none;
    text-shadow:0 0 8px rgba(0,0,0,0.7);
  }
}
</style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="gotham.mp4" type="video/mp4" />
</video>

<nav class="menu" aria-label="Stagioni">
  <a href="#" class="link active" data-page="1" data-label="Volume I - L'estate prolungata">
    <span class="link-icon">S1</span>
    <span class="link-text">L'estate prolungata</span>
  </a>
  <a href="#" class="link" data-page="45" data-label="Volume II - L'inverno sta arrivando">
    <span class="link-icon">S2</span>
    <span class="link-text">L'inverno sta arrivando</span>
  </a>
  <a href="#" class="link" data-page="98" data-label="Volume III - L'Abisso">
    <span class="link-icon">S3</span>
    <span class="link-text">L'Abisso</span>
  </a>
    <a href="#" class="link" data-page="148" data-label="Volume III - L'Abisso">
    <span class="link-icon">S4</span>
    <span class="link-text">A million miles from home</span>
  </a>
</nav>

<header class="title-container" role="banner">
  <div class="logo-wrap" aria-hidden="true">
    <svg class="bat-logo" width="64" height="40" viewBox="0 0 64 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M32 4c-6 0-9 6-15 6-3 0-6-3-9-3 2 4 3 8 0 11 6-1 9 4 18 4s12-5 18-4c-3-3-2-7 0-11-3 0-6 3-9 3-6 0-9-6-15-6z" fill="#f1c40f"/>
    </svg>
  </div>
  <div class="title-text">
    <h1 id="comic-title" class="title-main">BATMAN</h1>
    <div id="title-sub" class="title-sub">Volume I - L'estate prolungata</div>
    <div class="title-reflection" aria-hidden="true"></div>
    <div class="title-scanline" aria-hidden="true"></div>
  </div>
</header>

<div class="reader-meta">
  <div id="reader-status" class="status-chip">Caricamento archivio tavole...</div>
</div>

<div class="comic-wrapper" role="region" aria-label="Fumetto">
  <div class="page-stage">
    <img id="main-comic" alt="Tavola del fumetto" src="" />
    <div id="page-shadow" aria-hidden="true"></div>
    <div id="page-counter" aria-hidden="true">-</div>
    <div id="vignette-container" aria-hidden="false"></div>
  </div>
</div>

<div class="toolbar" aria-label="Controlli lettore">
  <button id="prev-btn" class="nav-btn" type="button" aria-label="Pagina precedente">Precedente</button>
  <div class="page-jump">
    <input type="number" id="page-input" min="1" placeholder="Pagina" />
    <button id="page-btn" type="button" aria-label="Vai alla pagina">Vai</button>
  </div>
  <button id="next-btn" class="nav-btn" type="button" aria-label="Pagina successiva">Successiva</button>
</div>

<div class="modal" id="modal" role="dialog" aria-modal="true">
  <img id="img-zoom" class="modal-content" alt="Vignetta ingrandita" />
</div>

<script>
const fumetti = Array.from({ length: 149 }, (_, i) => `tavole/tavola${i}.jpg`);
const vignetteDisponibili = new Set([
  "vignette/vignetta1_0.jpeg",
  "vignette/vignetta2_0.jpeg",
  "vignette/vignetta3_0.jpeg"
]);

const seasonLabels = [
  { start: 1, end: 44, label: "Volume I - L'estate prolungata" },
  { start: 45, end: 97, label: "Volume II - L'inverno sta arrivando" },
  { start: 98, end: 147, label: "Volume III - L'Abisso" },
  { start: 148, end: 149, label: "Volume IV - A million miles from home" }
];

let paginaCorrente = 0;
let modalOpen = false;

const mainComic = document.getElementById("main-comic");
const pageCounter = document.getElementById("page-counter");
const modal = document.getElementById("modal");
const imgZoom = document.getElementById("img-zoom");
const seasonLinks = document.querySelectorAll(".link");
const wrapper = document.querySelector(".comic-wrapper");
const shadow = document.getElementById("page-shadow");
const vignetteContainer = document.getElementById("vignette-container");
const menu = document.querySelector(".menu");
const statusChip = document.getElementById("reader-status");
const titleSub = document.getElementById("title-sub");
const prevBtn = document.getElementById("prev-btn");
const nextBtn = document.getElementById("next-btn");
const pageInput = document.getElementById("page-input");
const pageBtn = document.getElementById("page-btn");

const defaultLayout = [{ top: 0, left: 0, width: 100, height: 100 }];

function getSeasonForPage(pageNumber){
  return seasonLabels.find(season => pageNumber >= season.start && pageNumber <= season.end) || seasonLabels[0];
}

function updateSeasonUi(pageNumber){
  const activeSeason = getSeasonForPage(pageNumber);
  titleSub.textContent = activeSeason.label;
  seasonLinks.forEach(link => {
    const startPage = parseInt(link.dataset.page, 10);
    const nextStart = Array.from(seasonLinks).find(other => parseInt(other.dataset.page, 10) > startPage);
    const endPage = nextStart ? parseInt(nextStart.dataset.page, 10) - 1 : fumetti.length;
    const isActive = pageNumber >= startPage && pageNumber <= endPage;
    link.classList.toggle("active", isActive);
  });
}

function updateStatus(message){
  statusChip.textContent = message;
}

function updateNavButtons(){
  prevBtn.disabled = paginaCorrente === 0;
  nextBtn.disabled = paginaCorrente === fumetti.length - 1;
}

function generaVignetta(pagina, index){
  return `vignette/vignetta${pagina}_${index}.jpeg`;
}

function getVignetteLayout(){
  return defaultLayout;
}

function closeModal(){
  modal.style.display = "none";
  modalOpen = false;
  imgZoom.removeAttribute("src");
}

function openVignetta(src){
  if(modalOpen || !src) return;
  imgZoom.src = src;
  modal.style.display = "flex";
  modalOpen = true;
}

function createVignetteArea(pagina, index, areaData){
  const area = document.createElement("div");
  area.className = "vignetta-area";
  area.style.top = `${areaData.top}%`;
  area.style.left = `${areaData.left}%`;
  area.style.width = `${areaData.width}%`;
  area.style.height = `${areaData.height}%`;

  const vignettaSrc = generaVignetta(pagina, index);
  const hasVignetta = vignetteDisponibili.has(vignettaSrc);
  area.dataset.vignettaSrc = vignettaSrc;
  area.dataset.hasVignetta = hasVignetta ? "true" : "false";

  area.addEventListener("click", event => {
    event.stopPropagation();
    if(!hasVignetta){
      updateStatus(`Nessuna vignetta dedicata per la pagina ${pagina}.`);
      return;
    }
    openVignetta(vignettaSrc);
  });
  return area;
}

function creaVignette(pagina){
  vignetteContainer.innerHTML = "";
  const layout = getVignetteLayout(pagina);
  layout.forEach((areaData, index) => {
    vignetteContainer.appendChild(createVignetteArea(pagina, index, areaData));
  });
}

function mostraPagina(index){
  paginaCorrente = Math.max(0, Math.min(index, fumetti.length - 1));
  const pageNumber = paginaCorrente + 1;
  const src = fumetti[paginaCorrente];

  updateStatus(`Pagina ${pageNumber} di ${fumetti.length}`);
  updateSeasonUi(pageNumber);
  updateNavButtons();
  pageCounter.textContent = `${pageNumber} / ${fumetti.length}`;

  mainComic.style.transition = "opacity .25s ease";
  mainComic.style.opacity = "0";

  const nextImage = new Image();
  nextImage.onload = () => {
    mainComic.src = src;
    mainComic.style.opacity = "1";
  };
  nextImage.onerror = () => {
    updateStatus(`Immagine mancante: ${src}`);
    mainComic.removeAttribute("src");
    mainComic.style.opacity = "1";
  };
  nextImage.src = src;

  creaVignette(pageNumber);
}

function nextPage(){
  if(paginaCorrente < fumetti.length - 1){
    mostraPagina(paginaCorrente + 1);
  }
}

function prevPage(){
  if(paginaCorrente > 0){
    mostraPagina(paginaCorrente - 1);
  }
}

seasonLinks.forEach(link => {
  link.addEventListener("click", event => {
    event.preventDefault();
    const page = parseInt(link.dataset.page, 10);
    if(!Number.isNaN(page)){
      mostraPagina(page - 1);
    }
  });
});

(function setupTouchExpand(){
  if(!seasonLinks.length) return;
  let touchTimer = null;

  seasonLinks.forEach(link => {
    link.addEventListener("touchstart", () => {
      if(link.classList.contains("expanded")) return;
      seasonLinks.forEach(item => {
        if(item !== link) item.classList.remove("expanded");
      });
      link.classList.add("expanded");
      if(touchTimer){
        clearTimeout(touchTimer);
      }
      touchTimer = setTimeout(() => {
        link.classList.remove("expanded");
      }, 2500);
    }, { passive: true });
  });

  document.addEventListener("touchstart", event => {
    if(!event.target.closest(".menu")){
      seasonLinks.forEach(link => link.classList.remove("expanded"));
      if(touchTimer){
        clearTimeout(touchTimer);
        touchTimer = null;
      }
    }
  }, { passive: true });
})();

pageBtn.addEventListener("click", () => {
  const page = parseInt(pageInput.value, 10);
  if(!Number.isNaN(page) && page >= 1 && page <= fumetti.length){
    mostraPagina(page - 1);
    pageInput.value = "";
  } else {
    updateStatus(`Inserisci una pagina tra 1 e ${fumetti.length}.`);
  }
});

pageInput.addEventListener("keydown", event => {
  if(event.key === "Enter"){
    pageBtn.click();
  }
});

prevBtn.addEventListener("click", prevPage);
nextBtn.addEventListener("click", nextPage);

modal.addEventListener("click", closeModal);

imgZoom.addEventListener("error", () => {
  closeModal();
  updateStatus("La vignetta selezionata non e' disponibile.");
});

document.addEventListener("keydown", event => {
  if(document.activeElement && document.activeElement.tagName === "INPUT") return;
  if(event.key === "Escape" && modalOpen){
    closeModal();
    return;
  }
  if(modalOpen) return;
  if(event.key === "ArrowRight") nextPage();
  if(event.key === "ArrowLeft") prevPage();
});

function setupSwipe(){
  if(!wrapper || !mainComic || !shadow) return;

  const SWIPE_INTENT_THRESHOLD = 10;
  const TAP_MAX_DISTANCE = 12;
  const SWIPE_TRIGGER_RATIO = 0.18;

  let touchStartX = 0;
  let touchStartY = 0;
  let touchCurrentX = 0;
  let touchCurrentY = 0;
  let dragging = false;
  let gestureMode = null;
  let pendingFrame = false;
  let lastDeltaX = 0;

  function canPreventTouch(event){
    return !!event && event.cancelable === true;
  }

  function resetTransform(){
    mainComic.style.transition = "transform .25s ease-out";
    mainComic.style.transform = "translate3d(0,0,0) rotateY(0)";
    shadow.style.opacity = 0;
    wrapper.classList.remove("is-swiping");
  }

  function applyDragTransform(deltaX){
    const width = wrapper.offsetWidth || window.innerWidth;
    const progress = deltaX / width;
    const limited = Math.max(-1, Math.min(progress, 1));
    const rotate = limited * 12;
    mainComic.style.transform = `translate3d(${deltaX}px,0,0) rotateY(${rotate}deg)`;
    shadow.style.opacity = Math.min(Math.abs(limited) * 0.55, 0.55);
    shadow.style.background = limited < 0
      ? "linear-gradient(to left, rgba(0,0,0,0.5), transparent)"
      : "linear-gradient(to right, rgba(0,0,0,0.5), transparent)";
  }

  function scheduleDrag(deltaX){
    lastDeltaX = deltaX;
    if(pendingFrame) return;
    pendingFrame = true;
    requestAnimationFrame(() => {
      pendingFrame = false;
      if(!dragging || gestureMode !== "swipe") return;
      applyDragTransform(lastDeltaX);
    });
  }

  function resolveTapTarget(clientX, clientY){
    const tapped = document.elementFromPoint(clientX, clientY);
    const vignetta = tapped && tapped.closest ? tapped.closest(".vignetta-area") : null;
    if(!vignetta) return;
    if(vignetta.dataset.hasVignetta !== "true"){
      updateStatus(`Nessuna vignetta dedicata per la pagina ${paginaCorrente + 1}.`);
      return;
    }
    openVignetta(vignetta.dataset.vignettaSrc);
  }

  function clearGesture(){
    dragging = false;
    gestureMode = null;
    lastDeltaX = 0;
    pendingFrame = false;
    wrapper.classList.remove("is-swiping");
    vignetteContainer.querySelectorAll(".vignetta-area.active-touch").forEach(area => {
      area.classList.remove("active-touch");
    });
  }

  wrapper.addEventListener("touchstart", event => {
    if(modalOpen) return;
    if(event.touches.length !== 1) return;
    dragging = true;
    touchStartX = event.touches[0].clientX;
    touchStartY = event.touches[0].clientY;
    touchCurrentX = touchStartX;
    touchCurrentY = touchStartY;
    gestureMode = null;
    mainComic.style.transition = "none";
  }, { passive: true });

  wrapper.addEventListener("touchmove", event => {
    if(!dragging) return;
    touchCurrentX = event.touches[0].clientX;
    touchCurrentY = event.touches[0].clientY;

    const deltaX = touchCurrentX - touchStartX;
    const deltaY = touchCurrentY - touchStartY;
    const absX = Math.abs(deltaX);
    const absY = Math.abs(deltaY);

    if(!gestureMode){
      if(absX < SWIPE_INTENT_THRESHOLD && absY < SWIPE_INTENT_THRESHOLD){
        return;
      }
      if(absX > absY){
        gestureMode = "swipe";
        wrapper.classList.add("is-swiping");
      } else {
        gestureMode = "scroll";
        resetTransform();
        return;
      }
    }

    if(gestureMode === "swipe"){
      if(canPreventTouch(event)){
        event.preventDefault();
      }
      scheduleDrag(deltaX);
    }
  }, { passive: false });

  wrapper.addEventListener("touchend", event => {
    if(!dragging || modalOpen){
      clearGesture();
      return;
    }

    const deltaX = touchCurrentX - touchStartX;
    const deltaY = touchCurrentY - touchStartY;
    const absX = Math.abs(deltaX);
    const absY = Math.abs(deltaY);
    const swipeThreshold = (wrapper.offsetWidth || window.innerWidth) * SWIPE_TRIGGER_RATIO;

    mainComic.style.transition = "transform .25s ease-out";

    if(gestureMode === "swipe" && absX >= swipeThreshold){
      mainComic.style.transform = deltaX < 0
        ? "translate3d(-100%,0,0) rotateY(-12deg)"
        : "translate3d(100%,0,0) rotateY(12deg)";
      setTimeout(() => {
        if(deltaX < 0){
          nextPage();
        } else {
          prevPage();
        }
        resetTransform();
      }, 200);
    } else {
      resetTransform();
      if((gestureMode === null || gestureMode === "tap") && absX <= TAP_MAX_DISTANCE && absY <= TAP_MAX_DISTANCE){
        const changedTouch = event.changedTouches[0];
        resolveTapTarget(changedTouch.clientX, changedTouch.clientY);
      }
    }
    clearGesture();
  }, { passive: false });

  wrapper.addEventListener("touchcancel", () => {
    resetTransform();
    clearGesture();
  }, { passive: true });
}

setupSwipe();

(function setupAutoHideMenu(){
  if(!menu) return;
  let lastScrollY = window.scrollY || 0;
  window.addEventListener("scroll", () => {
    const currentScrollY = window.scrollY || 0;
    if(currentScrollY > lastScrollY && currentScrollY > 80){
      menu.classList.add("hidden");
    } else {
      menu.classList.remove("hidden");
    }
    lastScrollY = currentScrollY;
  }, { passive: true });
})();

(function setupTitleEffects(){
  const title = document.querySelector(".title-main");
  if(!title) return;
  title.setAttribute("data-text", title.textContent);
  title.animate(
    [
      { transform: "scale(1) translateY(0)" },
      { transform: "scale(1.02) translateY(-2px)" },
      { transform: "scale(1) translateY(0)" }
    ],
    { duration: 2400, iterations: 1, easing: "ease-out", delay: 200 }
  );

  function doGlitch(){
    title.classList.add("glitch");
    title.style.filter = "brightness(1.4) saturate(1.1)";
    setTimeout(() => {
      title.classList.remove("glitch");
      title.style.filter = "";
    }, 360);
  }

  function scheduleGlitch(){
    const delay = 6000 + Math.random() * 6000;
    setTimeout(() => {
      doGlitch();
      scheduleGlitch();
    }, delay);
  }

  scheduleGlitch();

  ["mouseenter", "touchstart"].forEach(eventName => {
    title.addEventListener(eventName, () => {
      title.style.transform = "translateY(-3px) scale(1.02)";
      setTimeout(() => {
        title.style.transform = "";
      }, 220);
    }, { passive: true });
  });
})();

mostraPagina(paginaCorrente);
</script>
